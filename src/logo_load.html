<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Recommendation Loader</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, #dcfce7 0%, transparent 35%),
        #f3f4f6;
      font-family: Inter, Arial, sans-serif;
    }

    .loader-card {
      width: 720px;
      padding: 56px 46px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.92);
      text-align: center;
      box-shadow: 0 30px 90px rgba(15, 23, 42, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.14);
    }

    .brain-box {
      width: 340px;
      height: 245px;
      margin: 0 auto 30px;
      position: relative;
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .brain-shape {
      fill: url(#brainGradient);
      stroke: #16a34a;
      stroke-width: 3.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 18px 32px rgba(34, 197, 94, 0.3));
      animation: brainThink 3s ease-in-out infinite;
      transform-origin: center;
    }

    .brain-fold {
      fill: none;
      stroke: rgba(22, 163, 74, 0.24);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .connection {
      fill: none;
      stroke: #16a34a;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 8 10;
      opacity: 0.45;
      animation: lineFlow 1.4s linear infinite;
    }

    .connection.strong {
      stroke: #22c55e;
      stroke-width: 3.4;
      opacity: 0.8;
    }

    .node {
      fill: #ffffff;
      stroke: #16a34a;
      stroke-width: 2.7;
      filter: drop-shadow(0 8px 12px rgba(22, 163, 74, 0.18));
    }

    .node.top {
      stroke: #f59e0b;
      stroke-width: 3.4;
      fill: #fffbeb;
    }

    .node-glow {
      fill: none;
      stroke: #22c55e;
      stroke-width: 2;
      opacity: 0;
      animation: nodePulse 2s ease-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    .node-glow.top {
      stroke: #f59e0b;
      animation-duration: 1.35s;
    }

    .employee {
      font-size: 15px;
      dominant-baseline: middle;
      text-anchor: middle;
      pointer-events: none;
    }

    .candidate-score {
      font-size: 8px;
      fill: #047857;
      font-weight: 800;
      text-anchor: middle;
    }

    .top-score {
      fill: #b45309;
    }

    .packet {
      fill: #22c55e;
      filter: drop-shadow(0 0 7px rgba(34, 197, 94, 0.9));
    }

    .packet.top {
      fill: #f59e0b;
      filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.95));
    }

    .spark {
      fill: #22c55e;
      animation: sparkPulse 1.8s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    h2 {
      margin: 0;
      font-size: 28px;
      color: #07111f;
      font-weight: 850;
      letter-spacing: -0.5px;
    }

    p {
      margin: 16px auto 24px;
      color: #526987;
      font-size: 16.5px;
      max-width: 580px;
      line-height: 1.65;
    }

    .status-box {
      margin: 0 auto;
      width: fit-content;
      min-width: 340px;
      padding: 14px 18px;
      border-radius: 999px;
      background: #ecfdf5;
      border: 1px solid rgba(34, 197, 94, 0.25);
      color: #047857;
      font-weight: 800;
      font-size: 15px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.6);
    }

    .dots span {
      animation: blink 1.4s infinite;
    }

    .dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    .mini-progress {
      margin: 24px auto 0;
      width: 360px;
      height: 8px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .mini-progress span {
      display: block;
      height: 100%;
      width: 45%;
      background: linear-gradient(90deg, #16a34a, #22c55e, #f59e0b);
      border-radius: inherit;
      animation: progressMove 2.2s ease-in-out infinite;
    }

    @keyframes brainThink {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 18px 32px rgba(34, 197, 94, 0.25));
      }
      50% {
        transform: scale(1.035) rotate(-0.6deg);
        filter: drop-shadow(0 22px 42px rgba(34, 197, 94, 0.42));
      }
    }

    @keyframes lineFlow {
      from { stroke-dashoffset: 36; }
      to { stroke-dashoffset: 0; }
    }

    @keyframes nodePulse {
      0% {
        transform: scale(1);
        opacity: 0.45;
      }
      100% {
        transform: scale(1.8);
        opacity: 0;
      }
    }

    @keyframes sparkPulse {
      0%, 100% {
        transform: scale(0.7);
        opacity: 0.25;
      }
      50% {
        transform: scale(1.35);
        opacity: 1;
      }
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    @keyframes progressMove {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(80%); }
      100% { transform: translateX(230%); }
    }
  </style>
</head>

<body>
  <div class="loader-card">
    <div class="brain-box">
      <svg viewBox="0 0 340 245">
        <defs>
          <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ecfdf5" />
            <stop offset="55%" stop-color="#d1fae5" />
            <stop offset="100%" stop-color="#bbf7d0" />
          </linearGradient>

          <path id="path1" d="M75 118 C112 56, 160 48, 238 96" />
          <path id="path2" d="M238 96 C278 122, 250 160, 205 164" />
          <path id="path3" d="M75 118 C94 150, 125 166, 158 160" />
          <path id="path4" d="M158 160 C175 150, 190 150, 205 164" />
          <path id="path5" d="M145 58 C150 94, 154 125, 158 160" />
          <path id="path6" d="M145 58 C185 80, 218 116, 205 164" />
        </defs>

        <path
          class="brain-shape"
          d="
            M88 178
            C61 176 42 160 43 136
            C22 123 25 88 52 78
            C48 51 76 32 106 43
            C123 18 166 19 185 44
            C214 31 248 43 260 68
            C287 72 303 98 292 123
            C313 145 296 177 263 178
            C260 200 232 215 205 202
            C183 222 137 217 123 194
            C106 201 91 194 88 178
            Z
          "
        />

        <path class="brain-fold" d="M73 82 C58 94 56 112 67 125" />
        <path class="brain-fold" d="M102 45 C91 58 88 73 95 89" />
        <path class="brain-fold" d="M184 45 C194 58 194 76 185 89" />
        <path class="brain-fold" d="M258 70 C245 80 244 99 257 111" />
        <path class="brain-fold" d="M287 125 C272 134 270 151 283 163" />
        <path class="brain-fold" d="M245 178 C234 184 232 196 238 205" />
        <path class="brain-fold" d="M123 194 C134 182 151 179 168 184" />
        <path class="brain-fold" d="M62 135 C77 140 82 153 75 166" />

        <use href="#path1" class="connection strong" />
        <use href="#path2" class="connection strong" />
        <use href="#path3" class="connection" />
        <use href="#path4" class="connection strong" />
        <use href="#path5" class="connection" />
        <use href="#path6" class="connection" />

        <circle class="packet top" r="4.5">
          <animateMotion dur="1.4s" repeatCount="indefinite">
            <mpath href="#path1" />
          </animateMotion>
        </circle>

        <circle class="packet" r="3.8">
          <animateMotion dur="1.9s" repeatCount="indefinite" begin="0.2s">
            <mpath href="#path3" />
          </animateMotion>
        </circle>

        <circle class="packet top" r="4.3">
          <animateMotion dur="1.6s" repeatCount="indefinite" begin="0.4s">
            <mpath href="#path2" />
          </animateMotion>
        </circle>

        <circle class="packet" r="3.5">
          <animateMotion dur="2s" repeatCount="indefinite" begin="0.6s">
            <mpath href="#path5" />
          </animateMotion>
        </circle>

        <circle class="node-glow" cx="75" cy="118" r="16" />
        <circle class="node-glow top" cx="145" cy="58" r="17" />
        <circle class="node-glow top" cx="238" cy="96" r="17" />
        <circle class="node-glow" cx="158" cy="160" r="16" />
        <circle class="node-glow top" cx="205" cy="164" r="17" />

        <circle class="node" cx="75" cy="118" r="16" />
        <circle class="node top" cx="145" cy="58" r="17" />
        <circle class="node top" cx="238" cy="96" r="17" />
        <circle class="node" cx="158" cy="160" r="16" />
        <circle class="node top" cx="205" cy="164" r="17" />

        <text class="employee" x="75" y="119">👤</text>
        <text class="employee" x="145" y="59">👤</text>
        <text class="employee" x="238" y="97">👤</text>
        <text class="employee" x="158" y="161">👤</text>
        <text class="employee" x="205" y="165">👤</text>

        <text class="candidate-score" x="75" y="147">72%</text>
        <text class="candidate-score top-score" x="145" y="32">94%</text>
        <text class="candidate-score top-score" x="238" y="70">91%</text>
        <text class="candidate-score" x="158" y="188">78%</text>
        <text class="candidate-score top-score" x="205" y="193">88%</text>

        <circle class="spark" cx="125" cy="124" r="3.7" />
        <circle class="spark" cx="172" cy="112" r="3.2" />
        <circle class="spark" cx="215" cy="130" r="3.5" />
      </svg>
    </div>

    <h2>Generating AI Recommendations</h2>

    <p>
      The AI is analyzing employee skills, department fit, previous activity history,
      availability, and activity requirements to rank the best candidates.
    </p>

    <div class="status-box">
      <span id="statusText">Analyzing employee profiles</span>
      <span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </div>

    <div class="mini-progress">
      <span></span>
    </div>
  </div>

  <script>
    const steps = [
      "Analyzing employee profiles",
      "Comparing skills with activity requirements",
      "Checking department and context fit",
      "Ranking strongest candidates",
      "Preparing recommendation explanation"
    ];

    let index = 0;
    const statusText = document.getElementById("statusText");

    setInterval(() => {
      index = (index + 1) % steps.length;
      statusText.textContent = steps[index];
    }, 1800);
  </script>
</body>
</html>
